name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: naijaledger
          POSTGRES_PASSWORD: naijaledger
          POSTGRES_DB: naijaledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U naijaledger -d naijaledger"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://naijaledger:naijaledger@localhost:5432/naijaledger
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Alembic upgrade
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest

  web:
    name: Web (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint + Prettier
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Vitest
        run: pnpm --filter @naijaledger/web test

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config
